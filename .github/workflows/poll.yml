name: Poll job boards

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "config/**"
      - "src/**"
      - ".github/workflows/poll.yml"

concurrency:
  group: poll
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run poller
        run: python -m src.poll

      - name: Commit updated jobs and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/jobs.json docs/meta.json state/seen_jobs.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "poll: refresh jobs $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
