<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobSearch</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="gate" class="gate hidden">
    <div class="gate-card">
      <h1>JobSearch</h1>
      <p>Enter passphrase to view</p>
      <input type="password" id="gate-input" autocomplete="off" placeholder="passphrase">
      <button id="gate-button">Unlock</button>
      <p id="gate-error" class="error hidden">Wrong passphrase</p>
    </div>
  </div>

  <main id="app" class="hidden">

    <header>
      <div class="title-row">
        <div>
          <h1>JobSearch</h1>
          <p class="subtitle" id="meta-line">loading…</p>
        </div>
        <div class="badges">
          <span class="badge badge-info" id="badge-hot">— hot</span>
          <span class="badge badge-neutral" id="badge-total">— total</span>
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">New today</div>
          <div class="metric-value" id="m-today">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">This week</div>
          <div class="metric-value" id="m-week">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Applied</div>
          <div class="metric-value" id="m-applied">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Interviewing</div>
          <div class="metric-value" id="m-interviewing">—</div>
        </div>
      </div>

      <div class="controls">
        <div class="role-dropdown" id="role-dropdown">
          <button class="role-dropdown-trigger" id="role-trigger" type="button" aria-haspopup="true" aria-expanded="false">
            <span id="role-trigger-label">Roles: 5 of 5</span>
            <span class="role-dropdown-chevron">▾</span>
          </button>
          <div class="role-dropdown-panel hidden" id="role-panel" role="menu">
            <label class="role-option"><input type="checkbox" data-role="vp" checked> VP Program Management</label>
            <label class="role-option"><input type="checkbox" data-role="director" checked> Director, Technical Program Management</label>
            <label class="role-option"><input type="checkbox" data-role="sr_manager" checked> Sr Manager, Technical Program Management</label>
            <label class="role-option"><input type="checkbox" data-role="manager" checked> Manager, Technical Program Management</label>
            <label class="role-option"><input type="checkbox" data-role="principal" checked> Principal Technical Program Management</label>
            <div class="role-panel-divider"></div>
            <label class="role-edit-search">
              <span>Edit search</span>
              <input type="text" id="role-search-text" placeholder="title, company, location…">
            </label>
          </div>
        </div>
        <select id="filter-source">
          <option value="">all sources</option>
          <option value="greenhouse">greenhouse</option>
          <option value="lever">lever</option>
          <option value="ashby">ashby</option>
          <option value="workday">workday</option>
        </select>
        <select id="filter-status">
          <option value="">all status</option>
          <option value="new">new</option>
          <option value="reviewing">reviewing</option>
          <option value="applied">applied</option>
          <option value="interviewing">interviewing</option>
          <option value="rejected">rejected</option>
          <option value="not-interested">not interested</option>
        </select>
        <select id="filter-score">
          <option value="">all scores</option>
          <option value="hot">hot only (85+)</option>
          <option value="standard">standard+ (70+)</option>
        </select>
        <button id="export-btn" title="Export your status data">Export</button>
        <button id="import-btn" title="Import status data">Import</button>
        <input type="file" id="import-file" accept=".json" hidden>
      </div>
    </header>

    <section class="results">
      <table id="jobs-table">
        <thead>
          <tr>
            <th class="col-score">Score</th>
            <th class="col-role">Role</th>
            <th class="col-company">Company</th>
            <th class="col-posted">Posted</th>
            <th class="col-status">Status</th>
          </tr>
        </thead>
        <tbody id="jobs-tbody">
          <tr><td colspan="5" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </section>

    <footer>
      <p>JobSearch · <a href="https://github.com/firelyco/JobSearch" target="_blank" rel="noopener">source on GitHub</a></p>
    </footer>

  </main>

  <script src="app.js"></script>
</body>
</html>
