# Tunable knobs for the resume tailoring + fit-scoring pipelines (JOBSEARCH-002).
# Loaded by src/tailor.py and src/fit.py at runtime.

# Provider is selected by the LLM_PROVIDER env var (set in the workflows):
#   "nvidia"    -> OpenAI-compatible NVIDIA NIM endpoint, needs NVIDIA_API_KEY
#   "anthropic" -> Claude, needs ANTHROPIC_API_KEY
# The model strings below must match the ACTIVE provider. They're currently
# set for NVIDIA DeepSeek. If you flip LLM_PROVIDER back to "anthropic",
# change these back to the claude-* slugs (e.g. claude-sonnet-4-6 /
# claude-haiku-4-5).
#
# NOTE: confirm the exact DeepSeek slug at build.nvidia.com — the catalog path
# is the model id. As of this writing it is deepseek-ai/deepseek-v4-flash.
models:
  tailor: "deepseek-ai/deepseek-v4-flash"
  verify: "deepseek-ai/deepseek-v4-flash"
  cover_letter: "deepseek-ai/deepseek-v4-flash"
  fit: "deepseek-ai/deepseek-v4-flash"

# Hard caps to prevent cost runaway (Risk 6 in PRD).
limits:
  max_tailor_calls_per_run: 3       # initial + 2 retries on failed bullets
  max_jd_tokens: 8000               # truncate JD before sending
  max_output_tokens: 2000           # tailored bullet output
  temperature: 0.4                  # slight variation across re-tailors

# Feature flags.
features:
  cover_letter: true                # generate cover letter in same run
  prompt_caching: true              # cache profile JSON across calls (Anthropic only)

# Verification policy.
verification:
  retry_failed_bullets: true
  # 1 retry (not 2) to bound total call count — each call is ~1-2 min on the
  # NVIDIA free tier. A bullet that fails its single retry is dropped.
  max_retries_per_bullet: 1
  drop_unverified: true             # ship shorter resume rather than wrong one
